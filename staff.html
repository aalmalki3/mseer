<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard | Mseer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B00; --primary-hover: #E65C00; --bg: #FFF2D0; --card: #FFFFFF;
            --text: #1A1A1A; --text-light: #666666; --border: #F0EBE1;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 30px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

        /* ─── Login ─── */
        #loginOverlay { position: fixed; inset: 0; background: rgba(255,242,208,0.98); display: flex; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px); }
        .login-box { background: var(--card); padding: 45px 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.06); width: 100%; max-width: 400px; text-align: center; }
        .login-box img { max-width: 80px; border-radius: 12px; display: block; margin: 0 auto 20px; }
        .login-box h2 { margin: 0 0 8px; font-size: 24px; font-weight: 700; }
        .login-box p.sub { color: var(--text-light); font-size: 15px; margin: 0 0 25px; }
        .login-box input { width: 100%; padding: 14px 16px; margin-bottom: 16px; border: 1px solid var(--border); border-radius: 12px; font-size: 15px; outline: none; transition: all 0.12s ease; font-family: inherit; }
        .login-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(255,107,0,0.08); }
        .login-box .btn-primary { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.12s ease; font-family: inherit; }
        .login-box .btn-primary:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); }
        .login-box .btn-primary:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        #loginError { color: #991B1B; font-size: 14px; margin-top: 14px; display: none; font-weight: 500; }

        /* ─── Dashboard ─── */
        .dashboard { display: none; max-width: 1200px; width: 100%; background: var(--card); padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.03); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; flex-wrap: wrap; gap: 20px; }
        .header h1 { margin: 0; font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
        .header-actions { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .stats { display: flex; gap: 15px; flex-wrap: wrap; }
        .stat-card { background: #FAFAF8; padding: 16px 24px; border-radius: 16px; border: 1px solid var(--border); min-width: 90px; }
        .stat-card .label { font-size: 11px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }
        .stat-card .value { font-size: 24px; font-weight: 700; margin-top: 6px; color: var(--primary); }

        .filter-bar { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .filter-btn { padding: 10px 20px; border: 1px solid var(--border); background: var(--card); border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500; transition: 0.2s; font-family: inherit; }
        .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .table-container { overflow-x: auto; border-radius: 16px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 18px 20px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
        th { background: #FAFAF8; font-weight: 600; color: var(--text-light); text-transform: uppercase; font-size: 11px; letter-spacing: 0.8px; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: #FFFDF5; }
        .empty-state { text-align: center; padding: 50px; color: var(--text-light); }

        .badge { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-block; white-space: nowrap; }
        .badge-pending   { background: #FEF3C7; color: #92400E; }
        .badge-analysis  { background: #DBEAFE; color: #1E40AF; }
        .badge-planning  { background: #F0F9FF; color: #0369A1; }
        .badge-scheduled { background: #FDF2F8; color: #9D174D; }
        .badge-completed { background: #DCFCE7; color: #166534; }

        .btn-sm { padding: 8px 16px; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 600; transition: all 0.2s; font-family: inherit; }
        .btn-view   { background: #F5F5F4; color: var(--text); }
        .btn-view:hover { background: #E7E5E4; }
        .btn-action { background: var(--primary); color: white; }
        .btn-action:hover { background: var(--primary-hover); }
        .btn-dark { padding: 10px 20px; background: #1A1A1A; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; font-family: inherit; }
        .btn-dark:hover { background: #333; }

        /* ─── Drawer ─── */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; display: none; opacity: 0; transition: opacity 0.3s; }
        .overlay.active { display: block; opacity: 1; }
        .drawer { position: fixed; top: 0; right: -500px; width: 450px; max-width: 92vw; height: 100vh; background: var(--card); z-index: 2001; box-shadow: -10px 0 30px rgba(0,0,0,0.1); transition: right 0.3s ease; display: flex; flex-direction: column; }
        .drawer.active { right: 0; }
        .drawer-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--card); }
        .drawer-header h2 { margin: 0; font-size: 20px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .close-btn { background: none; border: none; font-size: 28px; cursor: pointer; color: var(--text-light); line-height: 1; padding: 0 4px; }
        .close-btn:hover { color: var(--text); }
        .drawer-body { padding: 24px; flex: 1; overflow-y: auto; }
        .detail-section { margin-bottom: 24px; }
        .detail-section h3 { font-size: 12px; text-transform: uppercase; color: var(--primary); letter-spacing: 0.8px; font-weight: 700; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        .detail-row { margin-bottom: 10px; font-size: 14px; line-height: 1.6; }
        .detail-label { font-weight: 600; color: var(--text-light); display: block; font-size: 11px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
        .detail-value { color: var(--text); word-break: break-word; }
        .cv-link { display: inline-flex; align-items: center; gap: 8px; background: #FFF8F0; color: var(--primary); padding: 10px 16px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 14px; }
        .cv-link:hover { background: #FFE0B2; }
        select, textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 14px; margin-top: 4px; outline: none; }
        select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,107,0,0.08); }

        /* ─── Reports Modal ─── */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 3000; display: none; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); width: 90%; max-width: 680px; border-radius: 20px; padding: 32px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .modal-header h2 { margin: 0; font-size: 20px; }
        .chart-bar-container { margin-bottom: 16px; }
        .chart-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; font-weight: 500; }
        .chart-bar-bg   { background: #F3F4F6; height: 12px; border-radius: 6px; overflow: hidden; }
        .chart-bar-fill { background: var(--primary); height: 100%; border-radius: 6px; transition: width 0.5s ease; }
        .report-summary { margin-top: 20px; font-size: 13px; color: var(--text-light); }
    </style>
</head>
<body>

    <!-- Login Overlay -->
    <div id="loginOverlay" role="dialog" aria-modal="true" aria-label="Staff Login">
        <div class="login-box">
            <img src="logo.jpeg" alt="Mseer Logo">
            <h2>Staff Access</h2>
            <p class="sub">Enter your dashboard password to continue</p>
            <input type="password" id="passwordInput" placeholder="Password"
                   autocomplete="current-password" aria-label="Password">
            <button type="button" class="btn-primary" id="unlockBtn" onclick="checkPassword()">
                Unlock Dashboard
            </button>
            <p id="loginError" role="alert" aria-live="assertive"></p>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard" role="main">
        <div class="header">
            <h1>Client Management</h1>
            <div class="header-actions">
                <div class="stats">
                    <div class="stat-card"><div class="label">Total</div><div class="value" id="totalCount">—</div></div>
                    <div class="stat-card"><div class="label">Active</div><div class="value" id="activeCount">—</div></div>
                    <div class="stat-card"><div class="label">Done</div><div class="value" id="completedCount">—</div></div>
                </div>
                <button type="button" class="btn-dark" onclick="showReports()">📊 Reports</button>
                <button type="button" class="btn-dark" onclick="exportToCSV()">📥 Export</button>
            </div>
        </div>

        <div class="filter-bar" role="group" aria-label="Filter clients">
            <button type="button" class="filter-btn active" onclick="filterTable('all', this)">All</button>
            <button type="button" class="filter-btn" onclick="filterTable('Pending Diagnosis', this)">Pending</button>
            <button type="button" class="filter-btn" onclick="filterTable('In Analysis', this)">Analysis</button>
            <button type="button" class="filter-btn" onclick="filterTable('Plan Creation', this)">Planning</button>
            <button type="button" class="filter-btn" onclick="filterTable('Scheduled', this)">Scheduled</button>
            <button type="button" class="filter-btn" onclick="filterTable('Completed', this)">Completed</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Client</th>
                        <th>Service</th>
                        <th>Target Role</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="clientTableBody">
                    <tr><td colspan="5"><div class="empty-state">Loading clients…</div></td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Drawer Overlay + Panel -->
    <div class="overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="clientDrawer"
         role="dialog" aria-modal="true" aria-labelledby="drawerClientName" aria-hidden="true">
        <div class="drawer-header">
            <h2 id="drawerClientName">Client Details</h2>
            <button type="button" class="close-btn" onclick="closeDrawer()" aria-label="Close panel">&times;</button>
        </div>
        <div class="drawer-body" id="drawerBody"></div>
    </div>

    <!-- Reports Modal -->
    <div class="modal" id="reportsModal"
         role="dialog" aria-modal="true" aria-labelledby="reportsTitle" aria-hidden="true">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="reportsTitle">Analytics &amp; Reports</h2>
                <button type="button" class="close-btn" onclick="closeReports()" aria-label="Close reports">&times;</button>
            </div>
            <div id="reportsContent"></div>
        </div>
    </div>

    <script>
        'use strict';

        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxpMDGM09varSi_2FbE-sBAomvioyeaH6Sy0pGjGlrqPUemTsl7sAyo_AGkaznZDY7l/exec';
        let allClients = [];

        const workflowStages = [
            { id: 'Pending Diagnosis', label: 'Pending Diagnosis', cls: 'badge-pending'   },
            { id: 'In Analysis',       label: 'In Analysis',       cls: 'badge-analysis'  },
            { id: 'Plan Creation',     label: 'Plan Creation',     cls: 'badge-planning'  },
            { id: 'Scheduled',         label: 'Scheduled',         cls: 'badge-scheduled' },
            { id: 'Completed',         label: 'Completed',         cls: 'badge-completed' }
        ];

        // ─── Helpers ──────────────────────────────────────────────────────────
        /** Escape user-supplied strings before inserting into innerHTML */
        function esc(s) {
            return (s == null ? '' : String(s))
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#x27;');
        }

        /** Escape CSV cell content */
        function csvEsc(s) { return (s == null ? '' : String(s)).replace(/"/g, '""'); }

        /** Session-stored password (set on successful login) */
        function getStoredPwd() { return sessionStorage.getItem('mseer_token') || ''; }

        /** Only allow known Google Drive URLs as CV links */
        function isSafeDriveUrl(url) {
            return typeof url === 'string' &&
                   /^https:\/\/(drive|docs)\.google\.com\//.test(url);
        }

        function getBadgeCls(status) {
            const s = workflowStages.find(x => x.id === status);
            return s ? s.cls : 'badge-pending';
        }

        // ─── Auth ─────────────────────────────────────────────────────────────
        async function checkPassword() {
            const inputEl  = document.getElementById('passwordInput');
            const btn      = document.getElementById('unlockBtn');
            const errorMsg = document.getElementById('loginError');
            const password = inputEl.value.trim();

            if (!password) {
                errorMsg.textContent = 'Please enter a password.';
                errorMsg.style.display = 'block';
                return;
            }
            btn.disabled = true;
            btn.textContent = 'Verifying…';
            errorMsg.style.display = 'none';

            try {
                const res    = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'authenticate', password }) });
                const result = await res.json();

                if (result && result.authenticated === true) {
                    sessionStorage.setItem('mseer_token', password); // store for API calls
                    document.getElementById('loginOverlay').style.display = 'none';
                    document.getElementById('dashboard').style.display    = 'block';
                    loadClients();
                } else {
                    errorMsg.textContent = 'Incorrect password — please try again.';
                    errorMsg.style.display = 'block';
                    inputEl.select();
                }
            } catch (err) {
                console.error('Auth error:', err);
                errorMsg.textContent = 'Network error. Please try again.';
                errorMsg.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Unlock Dashboard';
            }
        }

        // ─── Data Loading ─────────────────────────────────────────────────────
        async function loadClients() {
            try {
                const res  = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getClients', password: getStoredPwd() })
                });
                const data = await res.json();

                if (data.status === 'error' && data.message === 'Unauthorized') {
                    sessionStorage.removeItem('mseer_token');
                    alert('Session expired. Please log in again.');
                    location.reload();
                    return;
                }
                allClients = Array.isArray(data.clients) ? data.clients : [];
                renderTable(allClients);
                updateStats();
            } catch (err) {
                console.error('Load failed:', err);
                document.getElementById('clientTableBody').innerHTML =
                    `<tr><td colspan="5"><div class="empty-state" style="color:#EF4444">Failed to load data — please refresh.</div></td></tr>`;
            }
        }

        // ─── Table Rendering (XSS-safe via DOM) ──────────────────────────────
        function renderTable(clients) {
            const tbody = document.getElementById('clientTableBody');
            tbody.innerHTML = '';

            if (!clients.length) {
                tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">No clients found.</div></td></tr>`;
                return;
            }

            clients.forEach(client => {
                const tr = document.createElement('tr');

                // Use DOM methods — never concatenate raw user data into innerHTML
                const nameTd = document.createElement('td');
                const strong = document.createElement('strong');
                strong.textContent = client.Name || '—';
                const small = document.createElement('small');
                small.style.color = 'var(--text-light)';
                small.textContent = client.Email || '';
                nameTd.appendChild(strong);
                nameTd.appendChild(document.createElement('br'));
                nameTd.appendChild(small);

                const serviceTd = document.createElement('td');
                serviceTd.textContent = client.Service || 'Career Diagnosis';

                const roleTd = document.createElement('td');
                roleTd.textContent = client.TargetRole || '—';

                const statusTd = document.createElement('td');
                const badge = document.createElement('span');
                badge.className = `badge ${getBadgeCls(client.Status)}`;
                badge.textContent = client.Status || 'Pending Diagnosis';
                statusTd.appendChild(badge);

                const actionTd = document.createElement('td');
                const viewBtn = document.createElement('button');
                viewBtn.type = 'button';
                viewBtn.className = 'btn-sm btn-view';
                viewBtn.textContent = 'View';
                viewBtn.addEventListener('click', () => viewClient(client.Email));
                actionTd.appendChild(viewBtn);

                tr.append(nameTd, serviceTd, roleTd, statusTd, actionTd);
                tbody.appendChild(tr);
            });
        }

        function updateStats() {
            document.getElementById('totalCount').textContent     = allClients.length;
            document.getElementById('activeCount').textContent    = allClients.filter(c => c.Status !== 'Completed').length;
            document.getElementById('completedCount').textContent = allClients.filter(c => c.Status === 'Completed').length;
        }

        function filterTable(status, btnEl) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if (btnEl) btnEl.classList.add('active');
            renderTable(status === 'all' ? allClients : allClients.filter(c => c.Status === status));
        }

        // ─── Drawer ───────────────────────────────────────────────────────────
        function viewClient(email) {
            const client = allClients.find(c => c.Email === email);
            if (!client) return;

            document.getElementById('drawerClientName').textContent = client.Name || 'Client Details';

            let pi = {};
            try { pi = JSON.parse(client.PersonalInfoJSON || '{}'); } catch (_) {}

            const body = document.getElementById('drawerBody');

            // Build drawer HTML — only esc() for values going into attribute/content strings
            body.innerHTML = `
                <div class="detail-section">
                    <h3>Workflow Stage</h3>
                    <select id="workflowSelect">
                        ${workflowStages.map(s =>
                            `<option value="${esc(s.id)}" ${client.Status === s.id ? 'selected' : ''}>${esc(s.label)}</option>`
                        ).join('')}
                    </select>
                </div>
                <div class="detail-section">
                    <h3>Contact Info</h3>
                    <div class="detail-row"><span class="detail-label">Name</span><span class="detail-value">${esc(client.Name)}</span></div>
                    <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${esc(client.Email)}</span></div>
                    <div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value" dir="ltr">${esc(pi.phone || 'N/A')}</span></div>
                    <div class="detail-row"><span class="detail-label">City</span><span class="detail-value">${esc(pi.city || 'N/A')}</span></div>
                    <div class="detail-row"><span class="detail-label">Target Role</span><span class="detail-value">${esc(client.TargetRole || 'N/A')}</span></div>
                </div>
                <div class="detail-section">
                    <h3>Documents</h3>
                    ${isSafeDriveUrl(client.CVLink)
                        ? `<a href="${esc(client.CVLink)}" target="_blank" rel="noopener noreferrer" class="cv-link">📎 View / Download CV</a>`
                        : `<p style="color:var(--text-light);font-size:13px;margin:0;">No CV uploaded.</p>`}
                </div>
                <div class="detail-section">
                    <h3>Coach Notes (Private)</h3>
                    <textarea id="coachNotes" rows="5" placeholder="Add private notes about this client…">${esc(client.Notes || '')}</textarea>
                    <button type="button" id="saveNotesBtn" class="btn-sm btn-action" style="margin-top:10px;width:100%;">Save Notes</button>
                </div>
            `;

            // Attach events safely — no user data in inline handlers
            document.getElementById('workflowSelect').addEventListener('change', ev => {
                updateWorkflow(email, ev.target.value);
            });
            document.getElementById('saveNotesBtn').addEventListener('click', () => {
                saveNotes(email);
            });

            document.getElementById('drawerOverlay').classList.add('active');
            const drawer = document.getElementById('clientDrawer');
            drawer.classList.add('active');
            drawer.setAttribute('aria-hidden', 'false');
        }

        function closeDrawer() {
            document.getElementById('drawerOverlay').classList.remove('active');
            const drawer = document.getElementById('clientDrawer');
            drawer.classList.remove('active');
            drawer.setAttribute('aria-hidden', 'true');
        }

        // ─── Workflow Update ──────────────────────────────────────────────────
        async function updateWorkflow(email, newStatus) {
            try {
                const res    = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'updateStatus', email, status: newStatus, password: getStoredPwd() })
                });
                const result = await res.json();
                if (result && result.status === 'success') {
                    const client = allClients.find(c => c.Email === email);
                    if (client) client.Status = newStatus; // sync local state
                    renderTable(allClients);
                    updateStats();
                } else {
                    throw new Error((result && result.message) || 'Unknown error');
                }
            } catch (err) {
                console.error('Workflow update failed:', err);
                alert('Failed to update status: ' + err.message);
                loadClients(); // re-sync from server on failure
            }
        }

        // ─── Save Notes ───────────────────────────────────────────────────────
        async function saveNotes(email) {
            const notesEl = document.getElementById('coachNotes');
            const btn     = document.getElementById('saveNotesBtn');
            if (!notesEl || !btn) return;

            const notes = notesEl.value;
            btn.disabled = true;
            btn.textContent = 'Saving…';

            try {
                const res    = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'updateNotes', email, notes, password: getStoredPwd() })
                });
                const result = await res.json();
                if (result && result.status === 'success') {
                    const client = allClients.find(c => c.Email === email);
                    if (client) client.Notes = notes; // sync local state
                    btn.textContent = '✅ Saved!';
                    setTimeout(() => { btn.textContent = 'Save Notes'; btn.disabled = false; }, 2000);
                } else {
                    throw new Error((result && result.message) || 'Save failed');
                }
            } catch (err) {
                console.error('Notes save failed:', err);
                alert('Failed to save notes: ' + err.message);
                btn.textContent = 'Save Notes';
                btn.disabled = false;
            }
        }

        // ─── Reports ──────────────────────────────────────────────────────────
        function showReports() {
            const counts = {};
            workflowStages.forEach(s => { counts[s.id] = 0; });
            allClients.forEach(c => { if (counts[c.Status] !== undefined) counts[c.Status]++; });
            const max = Math.max(...Object.values(counts), 1);

            document.getElementById('reportsContent').innerHTML = `
                <h3 style="margin:0 0 20px;">Client Pipeline</h3>
                ${workflowStages.map(s => `
                    <div class="chart-bar-container">
                        <div class="chart-label"><span>${esc(s.label)}</span><strong>${counts[s.id]}</strong></div>
                        <div class="chart-bar-bg">
                            <div class="chart-bar-fill" style="width:${(counts[s.id] / max) * 100}%"></div>
                        </div>
                    </div>`).join('')}
                <p class="report-summary">
                    Total: <strong>${allClients.length}</strong> &nbsp;·&nbsp;
                    Active: <strong>${allClients.filter(c => c.Status !== 'Completed').length}</strong> &nbsp;·&nbsp;
                    Completed: <strong>${allClients.filter(c => c.Status === 'Completed').length}</strong>
                </p>
            `;

            const modal = document.getElementById('reportsModal');
            modal.classList.add('active');
            modal.setAttribute('aria-hidden', 'false');
        }

        function closeReports() {
            const modal = document.getElementById('reportsModal');
            modal.classList.remove('active');
            modal.setAttribute('aria-hidden', 'true');
        }

        // ─── CSV Export (expanded fields, BOM for Arabic Excel) ───────────────
        function exportToCSV() {
            if (!allClients.length) { alert('No data to export.'); return; }

            const cols = ['Name','Email','Phone','City','Service','Status','Target Role','CV Link','Timestamp'];
            const rows = allClients.map(c => {
                let pi = {};
                try { pi = JSON.parse(c.PersonalInfoJSON || '{}'); } catch (_) {}
                return [
                    `"${csvEsc(c.Name)}"`,
                    `"${csvEsc(c.Email)}"`,
                    `"${csvEsc(pi.phone || '')}"`,
                    `"${csvEsc(pi.city  || '')}"`,
                    `"${csvEsc(c.Service)}"`,
                    `"${csvEsc(c.Status)}"`,
                    `"${csvEsc(c.TargetRole)}"`,
                    `"${csvEsc(c.CVLink)}"`,
                    `"${csvEsc(String(c.Timestamp || ''))}"`
                ].join(',');
            });

            const csv  = [cols.join(','), ...rows].join('\n');
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' }); // BOM = Arabic works in Excel
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement('a');
            a.href     = url;
            a.download = `Mseer_Clients_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ─── Keyboard shortcuts ───────────────────────────────────────────────
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') { closeDrawer(); closeReports(); }
        });

        document.getElementById('passwordInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') { e.preventDefault(); checkPassword(); }
        });
    </script>
</body>
</html>
