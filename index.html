<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Growth Platform</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background: var(--card); padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 480px; }
        h2 { margin: 0 0 8px; font-size: 24px; font-weight: 700; text-align: center; }
        p.subtitle { margin: 0 0 30px; color: #64748b; text-align: center; font-size: 14px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        input, select { width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 15px; box-sizing: border-box; transition: all 0.2s; outline: none; }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        
        .status-msg { margin-top: 20px; padding: 12px; border-radius: 8px; font-size: 14px; text-align: center; display: none; }
        .success { background: #dcfce7; color: #166534; display: block; }
        .error { background: #fee2e2; color: #991b1b; display: block; }
        .loading { opacity: 0.7; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Start Your Career Journey</h2>
        <p class="subtitle">Professional CV & Strategic Career Planning</p>
        
        <form id="intakeForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="e.g. Sarah Johnson" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="sarah@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="serviceType">Select Service</label>
                <select id="serviceType" name="serviceType" required>
                    <option value="" disabled selected>Choose your path...</option>
                    <option value="Launch Pad">🚀 Launch Pad (New to Market)</option>
                    <option value="Growth Accelerator">📈 Growth Accelerator (Seeking Better)</option>
                    <option value="Pivot Blueprint">🔄 Pivot Blueprint (Career Change)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="currentRole">Current Job Title</label>
                <input type="text" id="currentRole" name="currentRole" placeholder="e.g. Marketing Coordinator">
            </div>
            
            <div class="form-group">
                <label for="targetRole">Target Job Title</label>
                <input type="text" id="targetRole" name="targetRole" placeholder="e.g. Senior Brand Manager">
            </div>
            
            <button type="submit" id="submitBtn">Submit Request</button>
            <div id="statusMsg" class="status-msg"></div>
        </form>
    </div>

    <script>
        // ⚠️ REPLACE WITH YOUR DEPLOYED APPS SCRIPT WEB APP URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxP4YZsGwenSV1-ugb8P0fxhnowEp0Q-7s3zPWd8XVVbsPzzCeSoJgg2tPFZ5fgLv8v/exec';

        const form = document.getElementById('intakeForm');
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('statusMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI Loading State
            btn.disabled = true;
            btn.textContent = 'Processing...';
            msg.className = 'status-msg';
            msg.style.display = 'none';
            form.classList.add('loading');

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Required for Google Apps Script
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                // Success State
                msg.textContent = '✅ Request received! Check your email shortly.';
                msg.className = 'status-msg success';
                form.reset();
            } catch (err) {
                // Error State
                msg.textContent = '❌ Something went wrong. Please try again.';
                msg.className = 'status-msg error';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Submit Request';
                form.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
