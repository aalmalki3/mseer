<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ابدأ رحلتك المهنية</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background: var(--card); padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 480px; text-align: center; }
        h2 { margin: 0 0 8px; font-size: 24px; font-weight: 700; }
        p.subtitle { margin: 0 0 30px; color: #64748b; font-size: 14px; line-height: 1.6; }
        
        .form-group { margin-bottom: 20px; text-align: right; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        input, select { width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 15px; box-sizing: border-box; outline: none; transition: all 0.2s; }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        .file-upload { border: 2px dashed #cbd5e1; border-radius: 8px; padding: 20px; cursor: pointer; transition: all 0.2s; background: #f8fafc; }
        .file-upload:hover { border-color: var(--primary); background: #eff6ff; }
        .file-upload input { display: none; }
        .file-label { color: #64748b; font-size: 14px; }
        .file-name { margin-top: 8px; font-size: 13px; color: var(--primary); font-weight: 600; display: none; }
        
        button[type="submit"] { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        button[type="submit"]:hover { background: #1d4ed8; }
        button[type="submit"]:disabled { background: #94a3b8; cursor: not-allowed; }
        
        .status-msg { margin-top: 20px; padding: 12px; border-radius: 8px; font-size: 14px; display: none; }
        .success { background: #dcfce7; color: #166534; display: block !important; }
        .error { background: #fee2e2; color: #991b1b; display: block !important; }
        .loading { opacity: 0.7; pointer-events: none; }
        
        .note { font-size: 12px; color: #94a3b8; margin-top: 6px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>ابدأ رحلتك المهنية</h2>
        <p class="subtitle">أرسل لنا سيرتك الذاتية الحالية أو بياناتك الأساسية، وسنتواصل معك لتحديد المسار الأنسب لك</p>
        
        <form id="intakeForm">
            <div class="form-group">
                <label>الاسم الكامل *</label>
                <input type="text" name="name" required placeholder="مثال: أحمد محمد">
            </div>
            
            <div class="form-group">
                <label>رقم التواصل (واتساب) *</label>
                <input type="tel" name="phone" required placeholder="05xxxxxxxx">
            </div>
            
            <div class="form-group">
                <label>البريد الإلكتروني *</label>
                <input type="email" name="email" required placeholder="example@email.com">
            </div>
            
            <div class="form-group">
                <label>المدينة</label>
                <input type="text" name="city" placeholder="الرياض، جدة...">
            </div>
            
            <div class="form-group">
                <label>سيرتك الذاتية القديمة (إن وجدت)</label>
                <div class="file-upload" onclick="document.getElementById('cvFile').click()">
                    <input type="file" id="cvFile" name="cvFile" accept=".pdf,.doc,.docx">
                    <div class="file-label">📎 اضغط لرفع الملف (PDF / Word)</div>
                    <div class="file-name" id="fileName"></div>
                </div>
                <div class="note">إذا لم يكن لديك سيرة ذاتية، لا تقلق! سنساعدك في بنائها من الصفر</div>
            </div>
            
            <button type="submit" id="submitBtn">إرسال الطلب</button>
            <div id="statusMsg" class="status-msg"></div>
        </form>
    </div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzixWWfjhTYGADs1fSOgjtvmz_2F5zau7eDphMLtRL6hjVwzRyeU-Jia87XWP3aRDdu/exec';

// File name display
document.getElementById('cvFile').addEventListener('change', function(e) {
    const fileName = e.target.files[0]?.name;
    const display = document.getElementById('fileName');
    if (fileName) { display.textContent = `✅ ${fileName}`; display.style.display = 'block'; }
    else { display.style.display = 'none'; }
});

document.getElementById('intakeForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('statusMsg');
    const form = e.target;
    
    btn.disabled = true; btn.textContent = 'جاري الإرسال...';
    msg.style.display = 'none'; form.classList.add('loading');

    const fd = new FormData(form);
    const data = Object.fromEntries(fd.entries());
    
    // Build minimal payload for public form
    const payload = {
        name: data.name,
        phone: data.phone,
        email: data.email,
        city: data.city || '',
        serviceType: 'Pending Diagnosis', // Staff assigns later
        currentRole: '',
        targetRole: '',
        personalInfo: JSON.stringify({ name: data.name, phone: data.phone, email: data.email, city: data.city || '' }),
        education: '', experience: '', certifications: '', projects: '', attachments: data.cvFile?.name || ''
    };

    try {
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        msg.textContent = '✅ تم الاستلام بنجاح! سنتواصل معك قريباً عبر الواتساب';
        msg.className = 'status-msg success';
        form.reset(); document.getElementById('fileName').style.display = 'none';
    } catch { 
        msg.textContent = '❌ حدث خطأ. يرجى المحاولة مرة أخرى أو التواصل مباشرة';
        msg.className = 'status-msg error'; 
    }
    finally { btn.disabled = false; btn.textContent = 'إرسال الطلب'; form.classList.remove('loading'); }
});
</script>
</body>
</html>
